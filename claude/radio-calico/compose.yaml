# Portable compose file — equivalent to the Makefile targets.
# Use with `podman-compose up -d` or `docker compose up -d` if you prefer
# compose tooling over the Makefile. The Makefile is the primary workflow
# here since podman-compose is not installed on this box.
services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: radiocalico-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: docker.io/library/nginx:1.27-alpine
    container_name: radiocalico-web
    ports:
      - "${WEB_HOST_PORT}:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./web/html:/usr/share/nginx/html:ro,Z
    depends_on:
      - db

volumes:
  pgdata:
    name: radiocalico-pgdata
