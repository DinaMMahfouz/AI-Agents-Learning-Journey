worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout  65;

    # Basic gzip for faster local iteration
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Sensible dev security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # Health check for tooling / load balancers
        location = /healthz {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok"}';
        }

        # Static site (the prototype lives here)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---------------------------------------------------------------
        # API reverse proxy -> radiocalico-app container (Node, :3000).
        # nginx resolves "radiocalico-app" via the podman network DNS.
        # ---------------------------------------------------------------
        location /api/ {
            proxy_pass         http://radiocalico-app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
